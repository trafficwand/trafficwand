name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    env:
      # Keychain lives under $RUNNER_TEMP (resolved per-step in the shell, since the
      # `runner` context is not available in job-level `env`). Hoisting the filename
      # here keeps the import and cleanup steps in sync from a single source.
      KEYCHAIN_FILE: app-signing.keychain-db
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: go-task/setup-task@v2
      - name: Install XcodeGen and create-dmg
        run: brew install xcodegen create-dmg

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/$KEYCHAIN_FILE"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo -n "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Partition list MUST include `codesign:` — without it, codesign/xcodebuild
          # can hang on a UI prompt or fail with errSecInternalComponent at signing
          # time. `apple-tool:,apple:` alone is insufficient.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the new keychain searchable so `security find-identity` in
          # build-dmg.sh's preflight resolves the identity. Verb is `list-keychains`
          # (PLURAL) for both read and write.
          # shellcheck disable=SC2046 # intentional word-splitting: each existing
          # keychain path must become a separate argument to list-keychains -s.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/[\"]//g')

      - name: Verify release version matches tag
        id: verify
        run: |
          VERSION="$(scripts/verify-release-version.sh "$GITHUB_REF_NAME")"
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"

      - name: Build, sign, notarize, and package DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: task dmg

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.verify.outputs.version }}
        run: |
          TAG="$GITHUB_REF_NAME"
          DMG="dist/TrafficWand-$RELEASE_VERSION.dmg"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" "$DMG" --generate-notes --verify-tag --title "$TAG"
          fi

      - name: Clean up signing keychain and decoded certificate
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/$KEYCHAIN_FILE" || true
          rm -f "$RUNNER_TEMP/cert.p12"
