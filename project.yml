name: TrafficWand

options:
  bundleIdPrefix: io.tomakado
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

# Local SPM package providing the pure, testable core. Both the app target and
# the app's test target depend on it (wired below under each target's
# dependencies).
packages:
  TrafficWandCore:
    path: TrafficWandCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.2"

settings:
  base:
    # Developer ID distribution, Hardened Runtime on, manual signing left to the
    # signer. During the Task 1 reality check, sign-to-run locally with an ad-hoc
    # or Development identity; release builds use a Developer ID Application cert.
    #
    # Task 1 reality-check findings:
    #   - With CODE_SIGN_IDENTITY "-" (ad-hoc), Xcode still signs the app with
    #     `-o runtime` (Hardened Runtime). NOTE: an earlier version of this
    #     comment claimed ad-hoc signing disabled Hardened Runtime — that was
    #     measured BEFORE Sparkle was a dependency and is wrong. Hardened Runtime
    #     enables Library Validation, which refuses to load the embedded
    #     Sparkle.framework (team-less ad-hoc framework vs. team-less ad-hoc app
    #     = "different Team IDs"), so a freshly-built local bundle CRASHES at
    #     launch via dyld. `scripts/install-app.sh` therefore deep-resigns the
    #     installed bundle ad-hoc WITHOUT the runtime flag to drop Library
    #     Validation. Release builds (`task dmg`) sign everything with one
    #     Developer ID identity, so Team IDs match and Hardened Runtime stays on
    #     (required for notarization) — ENABLE_HARDENED_RUNTIME is meaningful
    #     there.
    #   - After building + `lsregister -f`, the app registers cleanly and shows
    #     "claimed schemes: http:, https:", so it appears in
    #     System Settings ▸ Default web browser. The Info.plist CFBundleURLTypes
    #     (http/https, LSHandlerRank=Default) + LSUIElement are sufficient; no
    #     extra signing setting was required to make the app a selectable default
    #     browser locally.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_VERSION: "6.0"
    # CFBundleShortVersionString. Bump before tagging a release; the git tag
    # must match (verify-release-version.sh enforces it).
    MARKETING_VERSION: "0.5.0"
    # CURRENT_PROJECT_VERSION (CFBundleVersion) is NOT set here on purpose: it is
    # injected per-build via BuildInfo.xcconfig (a target configFile, which wins
    # over this project-level setting) as the commit count, so every commit
    # yields a strictly-higher, monotonic build number with no manual bump.
    # See `task build-info` and the "Build-info" section in CLAUDE.md.

targets:
  TrafficWand:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/AppIcon.icon
    dependencies:
      - package: TrafficWandCore
      - package: Sparkle
    configFiles:
      Debug: BuildInfo.xcconfig
      Release: BuildInfo.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tomakado.TrafficWand
        PRODUCT_NAME: TrafficWand
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/TrafficWand.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Menu-bar agent: no Dock icon (mirrors LSUIElement in Info.plist).
        LSUIElement: YES

  TrafficWandTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: App/Tests/AppTests
    dependencies:
      - target: TrafficWand
      - package: TrafficWandCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.tomakado.TrafficWandTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TrafficWand:
    build:
      targets:
        TrafficWand: all
        TrafficWandTests: [test]
    test:
      targets:
        - TrafficWandTests
