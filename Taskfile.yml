version: "3"

vars:
  SCHEME: TrafficWand
  CORE_DIR: TrafficWandCore
  CORE_SOURCES: TrafficWandCore/Sources/TrafficWandCore

tasks:
  default:
    desc: Generate project, build, lint, and run all tests
    cmds:
      - task: build-info
      - task: generate
      - task: build
      - task: lint
      - task: test-core
      - task: test

  generate:
    desc: Generate the Xcode project from project.yml
    # `build-info` must run first: project.yml references BuildInfo.xcconfig
    # as the target's per-config xcconfig, and xcodegen validates the file
    # exists at spec-validation time. On a fresh checkout (CI, new clone) the
    # file doesn't exist yet — running build-info first guarantees it does.
    deps: [build-info]
    cmds:
      - xcodegen generate

  build-info:
    desc: Write BuildInfo.xcconfig with the current short git commit hash
    cmds:
      # Resolve the short commit hash if we're inside a git work tree; otherwise
      # fall back to the literal "unknown" sentinel that BuildInfo treats as nil.
      - |
        if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          COMMIT=$(git rev-parse --short HEAD)
        else
          COMMIT=unknown
        fi
        printf '// BuildInfo.xcconfig — generated by `task build-info`, do not edit\nGIT_COMMIT = %s\n' "$COMMIT" > BuildInfo.xcconfig

  build:
    desc: Build the app target
    deps: [generate]
    cmds:
      - xcodebuild build -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -destination 'platform=macOS'

  test-core:
    desc: Run the Core package tests and enforce the no-AppKit-import guard
    cmds:
      # Architecture guard: no Core source may import AppKit (keeps the core pure
      # and unit-testable without a UI runtime).
      - |
        if grep -R -n -E '^\s*import\s+AppKit' {{.CORE_SOURCES}} ; then
          echo "ERROR: TrafficWandCore must not import AppKit." >&2
          exit 1
        fi
      - cd {{.CORE_DIR}} && swift test

  test:
    desc: Run the app test target (includes Core via SPM)
    deps: [generate]
    cmds:
      - xcodebuild test -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -destination 'platform=macOS'

  lint:
    desc: Run SwiftLint across the repo
    cmds:
      - swiftlint lint --quiet

  run:
    desc: Build and launch the app
    deps: [build]
    cmds:
      - |
        APP_PATH=$(xcodebuild -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -showBuildSettings 2>/dev/null | awk -F' = ' '/ BUILT_PRODUCTS_DIR /{d=$2}/ FULL_PRODUCT_NAME /{n=$2}END{print d"/"n}')
        open "$APP_PATH"

  dmg:
    desc: Build, sign, notarize, and package the app as a DMG (release)
    # Requires four env vars: DEVELOPER_ID_APPLICATION, APPLE_ID, APPLE_TEAM_ID,
    # APPLE_APP_SPECIFIC_PASSWORD. Run `./scripts/build-dmg.sh --preflight` to
    # validate them (and tool availability) without invoking the expensive
    # archive/notarize steps.
    #
    # `deps: [generate]` is for .xcodeproj freshness + BuildInfo.xcconfig
    # materialization, not for compilation. The script's `xcodebuild archive`
    # does its own full Release build from scratch — depending on `build` here
    # would just build the Debug configuration uselessly before the archive.
    deps: [generate]
    cmds:
      - ./scripts/build-dmg.sh
