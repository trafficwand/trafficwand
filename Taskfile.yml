version: "3"

vars:
  SCHEME: TrafficWand
  CORE_DIR: TrafficWandCore
  CORE_SOURCES: TrafficWandCore/Sources/TrafficWandCore

tasks:
  default:
    desc: Generate project, build, lint, and run all tests
    cmds:
      - task: build-info
      - task: generate
      - task: build
      - task: lint
      - task: test-core
      - task: test

  generate:
    desc: Generate the Xcode project from project.yml
    # `build-info` must run first: project.yml references BuildInfo.xcconfig
    # as the target's per-config xcconfig, and xcodegen validates the file
    # exists at spec-validation time. On a fresh checkout (CI, new clone) the
    # file doesn't exist yet — running build-info first guarantees it does.
    deps: [build-info]
    cmds:
      - xcodegen generate

  build-info:
    desc: Write BuildInfo.xcconfig with the current short git commit hash and monotonic build number
    cmds:
      # Resolve the short commit hash and a monotonic build number if we're
      # inside a git work tree; otherwise fall back to sentinels: "unknown" for
      # the commit (BuildInfo treats it as nil) and "1" for the build number.
      # The build number is the commit count, so every commit yields a
      # strictly-higher CFBundleVersion with no manual bump — the value Sparkle
      # uses for its version comparison.
      - |
        if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          COMMIT=$(git rev-parse --short HEAD)
          BUILD=$(git rev-list --count HEAD)
        else
          COMMIT=unknown
          BUILD=1
        fi
        printf '// BuildInfo.xcconfig — generated by `task build-info`, do not edit\nGIT_COMMIT = %s\nCURRENT_PROJECT_VERSION = %s\n' "$COMMIT" "$BUILD" > BuildInfo.xcconfig

  build:
    desc: Build the app target
    vars:
      CONFIG: '{{.CONFIG | default "Debug"}}'
    deps: [generate]
    cmds:
      - xcodebuild build -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -configuration "{{.CONFIG}}" -destination 'platform=macOS'

  install:
    desc: Build Release and install TrafficWand.app to /Applications (quits any running instance, no relaunch)
    vars:
      CONFIG: Release
    deps: [{ task: build, vars: { CONFIG: '{{.CONFIG}}' } }]
    cmds:
      - ./scripts/install-app.sh "{{.CONFIG}}"

  install-dev:
    desc: Build Debug and install TrafficWand.app to /Applications (quits any running instance, no relaunch)
    vars:
      CONFIG: Debug
    deps: [{ task: build, vars: { CONFIG: '{{.CONFIG}}' } }]
    cmds:
      - ./scripts/install-app.sh "{{.CONFIG}}"

  test-core:
    desc: Run the Core package tests and enforce the no-AppKit-import guard
    cmds:
      # Architecture guard: no Core source may import AppKit (keeps the core pure
      # and unit-testable without a UI runtime).
      - |
        if grep -R -n -E '^\s*import\s+AppKit' {{.CORE_SOURCES}} ; then
          echo "ERROR: TrafficWandCore must not import AppKit." >&2
          exit 1
        fi
      - cd {{.CORE_DIR}} && swift test

  test:
    desc: Run the app test target (includes Core via SPM)
    deps: [generate]
    cmds:
      - xcodebuild test -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -destination 'platform=macOS'

  lint:
    desc: Run SwiftLint across the repo
    cmds:
      - swiftlint lint --quiet

  run:
    desc: Build and launch the app
    deps: [build]
    cmds:
      - |
        APP_PATH=$(xcodebuild -project TrafficWand.xcodeproj -scheme {{.SCHEME}} -showBuildSettings 2>/dev/null | awk -F' = ' '/ BUILT_PRODUCTS_DIR /{d=$2}/ FULL_PRODUCT_NAME /{n=$2}END{print d"/"n}')
        open "$APP_PATH"

  "sparkle:install":
    desc: Download the pinned Sparkle binary tools (sign_update, generate_keys) into .sparkle/
    # Idempotent: a no-op once the pinned version is already present. Tools land in
    # .sparkle/bin/ (gitignored). Version/checksum live in scripts/sparkle-tools.sh.
    cmds:
      - ./scripts/install-sparkle-tools.sh

  "sparkle:gen-keys":
    desc: Generate the Sparkle EdDSA signing keypair (private key → login Keychain, public key → stdout)
    # One-time operator step (see docs/spikes/sparkle-updates.md §1). Prints the
    # PUBLIC key to paste into App/Resources/Info.plist (SUPublicEDKey); the PRIVATE
    # key is stored in the login Keychain and must be preserved forever. If a key
    # already exists, generate_keys prints the existing public key instead of
    # overwriting. Export it for CI later with: .sparkle/bin/generate_keys -x <file>
    deps: ["sparkle:install"]
    cmds:
      - ./.sparkle/bin/generate_keys

  dmg:
    desc: Build, sign, notarize, and package the app as a DMG (release)
    # Requires four env vars: DEVELOPER_ID_APPLICATION, APPLE_ID, APPLE_TEAM_ID,
    # APPLE_APP_SPECIFIC_PASSWORD. Run `./scripts/build-dmg.sh --preflight` to
    # validate them (and tool availability) without invoking the expensive
    # archive/notarize steps.
    #
    # `deps: [generate]` is for .xcodeproj freshness + BuildInfo.xcconfig
    # materialization, not for compilation. The script's `xcodebuild archive`
    # does its own full Release build from scratch — depending on `build` here
    # would just build the Debug configuration uselessly before the archive.
    deps: [generate]
    cmds:
      - ./scripts/build-dmg.sh
